version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: something-sweet-postgres
    environment:
      POSTGRES_DB: sweet_bakery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
